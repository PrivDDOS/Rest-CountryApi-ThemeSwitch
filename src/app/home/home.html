<div id="container">

    <div class="nav-section">

        <div class="nav-left">
            <h3>Where in the world?</h3>
        </div>

        <div class="nav-right">
            <button (click)="darkMode()">
                <span></span>
                <p>Dark Mode</p>
            </button>
        </div>

    </div>

    <div class="search-section">

        <div class="search-left">
            <button>
                <span></span>
            </button>
            <input #searchBox (input)="searchCountry(searchBox.value)" type="text" placeholder="Search for a country...">
        </div>

        <div class="search-right">
            
                <div class="dropdown-container">
                    <h4>Filter by Region</h4>
                    <button>
                        <span></span>
                    </button>
                </div>

                <div class="bridge"></div>

                <div class="dropdown-content">
                    <button (click)="getRegion('Africa')">Africa</button>
                    <button (click)="getRegion('Americas')">America</button>
                    <button (click)="getRegion('Asia')">Asia</button>
                    <button (click)="getRegion('Europe')">Europe</button>
                    <button (click)="getRegion('Oceania')">Oceania</button>
                </div>
            
        </div>

    </div>

    <main id="main">
        <div 
        *ngFor="let country of filteredData"
        class="country"
        >
            <div class="img">
                <img [src]="country.flags.svg" [alt]="country.name + 'flag' ">
            </div>
            <div class="context">
                <h1>{{ country.name }}</h1>
                <p><strong>Population: </strong>{{ country.population }}</p>
                <p><strong>Region: </strong>{{ country.region }}</p>
                <p><strong>Capital: </strong>{{ country.capital }}</p>
            </div>
        </div>
    </main>

</div>
